<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./css/cadastro.css">
     <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,400;0,500;0,600;0,700;0,800;1,600;1,800&display=swap"
    rel="stylesheet">
    <title>Cadastro</title>


</head>
<body class="bodyLogin">
<div class="btn">
<a href="#"> <img src="../../img/Back.svg" alt="seta de voltar"> Voltar</a>
<button class="modo"><img src="../../img/modoEscuro.svg" alt=""></button>
</div>

<div class="formLogin">
<form action="formulario">


<h1 class="titleLogin">Cadastro</h1>

<div>
<label for="nome">Nome</label>
<div class="input">
<img class="icon" src="../../img/user.svg" alt="icone de usuario">
<input type="text" class="cor" id="nome" name="nome" placeholder="Nome" required>
</div>

<label for="e-mail">E-mail</label>
<div class="input">
<img class="icon" src="../../img/email.svg" alt="icone de email">
<input type="email" class="cor" id="e-mail" name="e-mail" placeholder="E-mail" required>
</div>

<label for="senha">Senha</label>
<div class="input">
<img class="icon" src="../../img/lock.svg" alt="icone de senha">
<input type="password" class="cor" id="senha" name="senha" placeholder="Senha" required>
</div>
</div>

      
<div class="borda">
<button type="submit" class="botao" id="btn-cadastar">CADASTRAR</button>

<div class="conta-login">
<label>Já tem uma conta?</label>
<a href="#">Faça Login</a>
</div>
   </div>   
      <div class="linha"></div>
    
<div class="svg">      
<label class="ou-entre">Ou entre com:</label> </div>
<div class="social">
<a href="#" ><img src="../../img/google.svg" alt="Google"></a>
<a href="#"><img src="../../img/apple.svg" alt="Iphone"></a>
</div>

</form>
</div>

<div class="logo">
<img src="../../img/logo-site.svg" alt="">
</div>
 
</body>
</html>
