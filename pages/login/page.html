<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login Web</title>

    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;800;900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./css/login.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    />
   
  </head>

  <body>
    <div class="Rectangle_3">
      <div class="logo">
        <div class="btn">
          <div class="seta"></div>
          <a href="../../index.html" class="voltar">← Voltar</a>

          <button class="modo">
            <div class="circulo"></div>
          </button>
        </div>

        <div class="logo_img">
          <img src="../../img/logo-site.svg" alt="logo" />
        </div>

        <h1 class="Slogan_da_Empresa"></h1>
      </div>

      <div class="Cadastro">
        <div class="alinhamento">
          <h2 class="LOGIN_Title">LOGIN</h2>

          <div class="email">
            <label class="EMAIL_label">E-mail</label>
            <div class="Rectangle_1">
              <input type="email" placeholder="seu@email.com" />
            </div>
          </div>

          <div class="Senha">
            <label class="SENHA_label">Senha</label>
            <div class="Rectangle_2">
              <input type="password" placeholder="********" />
            </div>
            <a href="#" class="Esqueceu_a_Senha">Esqueceu a senha?</a>
          </div>

          <div class="button">
            <button class="Rounded_rectangle"><a href="../controle-de-gasto/controledegastos.html">LOGIN</a></button>
            <p class="Nao_tem_Cadastro">
              Não tem cadastro? <a href="../cadastro/page.html">Cadastre-se</a>
            </p>
          </div>

          <div class="Line_1"></div>

          <div class="Frame_4">
            <p>Ou entre com:</p>

            <div class="Frame_3">
              <div class="google_icon">
                <i class="fa-brands fa-google"></i>
              </div>

              <div class="apple_icon">
                <i class="fa-brands fa-apple"></i>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
